# 用 GitHub Container Registry 镜像部署时使用此文件。
# 在 fnos.env 中设置：QC86_IMAGE=ghcr.io/<GitHub 用户名>/<仓库名>:v1.0.1
services:
  qc86-platform:
    image: ${QC86_IMAGE:?请先在 fnos.env 中设置 QC86_IMAGE}
    container_name: qc86-platform
    restart: unless-stopped
    init: true
    env_file:
      - ./fnos.env
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=3000
      - NODE_ENV=production
      - APP_STAGE=${APP_STAGE:-production}
      - APP_VERSION=${APP_VERSION:-}
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
